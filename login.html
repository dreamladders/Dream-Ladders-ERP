<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dream Ladders ERP | Login</title>

    <meta name="description"
          content="Dream Ladders ERP Login">

    <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
</head>

<body>

    <main class="login-page">

        <section class="login-card">

            <header class="login-header">

                <div class="logo-container">

                    <!-- Logo will be added later -->

                    <h1>Dream Ladders ERP</h1>

                    <p>
                        Sign in to continue
                    </p>

                </div>

            </header>

            <form id="loginForm"
                  autocomplete="on"
                  novalidate>

                <div class="form-group">

                    <label for="username">

                        Username or Email

                    </label>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter your username or email"
                        required>

                </div>

                <div class="form-group">

                    <label for="password">

                        Password

                    </label>

                    <div class="password-wrapper">

                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required>

                        <button
                            type="button"
                            id="togglePassword">

                            Show

                        </button>

                    </div>

                </div>

                <div class="login-options">

                    <label>

                        <input
                            type="checkbox"
                            id="rememberMe">

                        Remember Me

                    </label>

                    <a href="#">

                        Forgot Password?

                    </a>

                </div>

                <button
                    type="submit"
                    id="loginButton">

                    Login

                </button>

            </form>

            <footer class="login-footer">

                <p>

                    © 2026 Dream Ladders.
                    All Rights Reserved.

                </p>

            </footer>

        </section>

    </main>

    <script src="js/auth.js"></script>

</body>

</html>
